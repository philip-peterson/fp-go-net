name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-minor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dagger/dagger-for-github@v7
        with:
          version: 0.20.6
          call: bump-minor --token=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
